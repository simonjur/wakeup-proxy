name: Docker publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/simonjur/wakeup-proxy

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The slim base image is multi-arch, so publish for amd64 and arm64
      # (arm64 lets this run on a Raspberry Pi).
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:alpha
          cache-from: type=gha
          cache-to: type=gha,mode=max
